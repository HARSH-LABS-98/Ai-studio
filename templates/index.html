<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ AI Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--panel:#141414;--border:#2a2a2a;
  --accent:#7c3aed;--accent2:#a855f7;--text:#e2e8f0;
  --muted:#64748b;--green:#22c55e;--red:#ef4444;--editor:#1e1e1e
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.model-select{background:var(--editor);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:0.8rem;cursor:pointer;outline:none}
.topbar-actions{display:flex;gap:8px;align-items:center}
.workspace{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:48px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0}
.sidebar-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.sidebar-btn:hover,.sidebar-btn.active{background:rgba(124,58,237,0.2);color:var(--accent2)}
.left-panel{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.generate-form{padding:16px;flex-shrink:0}
.generate-form textarea{width:100%;background:var(--editor);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:0.85rem;resize:none;height:110px;outline:none;font-family:inherit;line-height:1.5;transition:border 0.2s}
.generate-form textarea:focus{border-color:var(--accent)}
.generate-form textarea::placeholder{color:var(--muted)}
.gen-btn{width:100%;margin-top:10px;padding:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:8px;color:white;font-size:0.9rem;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.gen-btn:hover{opacity:0.9}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed}
.examples-section{padding:0 16px 12px;flex-shrink:0}
.examples-label{font-size:0.75rem;color:var(--muted);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--editor);border:1px solid var(--border);border-radius:12px;padding:4px 10px;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:var(--accent);color:var(--accent2)}
.projects-section{flex:1;overflow-y:auto;border-top:1px solid var(--border)}
.project-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s;display:flex;justify-content:space-between;align-items:center}
.project-item:hover{background:rgba(124,58,237,0.1)}
.project-item.active{background:rgba(124,58,237,0.2);border-left:2px solid var(--accent)}
.project-name{font-size:0.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.project-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;padding:2px 6px;border-radius:4px;opacity:0;transition:all 0.2s}
.project-item:hover .project-del{opacity:1}
.project-del:hover{color:var(--red)}
.empty-msg{padding:20px 16px;color:var(--muted);font-size:0.8rem;text-align:center}
#chatPanel{display:none;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.message{padding:10px 14px;border-radius:10px;font-size:0.85rem;line-height:1.6;word-break:break-word}
.message.user{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);align-self:flex-end}
.message.assistant{background:var(--editor);border:1px solid var(--border);align-self:flex-start}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--editor);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:0.85rem;outline:none;font-family:inherit;resize:none;height:60px;transition:border 0.2s}
.chat-input:focus{border-color:var(--accent)}
.send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:8px;color:white;cursor:pointer;font-size:1rem;align-self:flex-end}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-tabs{display:flex;align-items:center;background:var(--panel);border-bottom:1px solid var(--border);padding:0 8px;height:40px;flex-shrink:0;gap:4px}
.tab{padding:6px 16px;font-size:0.82rem;border-radius:6px 6px 0 0;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all 0.2s;border-bottom:2px solid transparent}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2);background:rgba(124,58,237,0.1)}
.editor-content{flex:1;display:flex;overflow:hidden}
#codeEditor{flex:1;background:var(--editor);color:#d4d4d4;font-family:'Courier New',monospace;font-size:0.85rem;line-height:1.7;padding:16px;border:none;outline:none;resize:none;overflow-y:auto;tab-size:2}
#previewFrame{flex:1;border:none;background:white;display:none}
.edit-bar{display:flex;gap:8px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
.edit-input{flex:1;background:var(--editor);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:0.85rem;outline:none;font-family:inherit;transition:border 0.2s}
.edit-input:focus{border-color:var(--accent)}
.edit-input::placeholder{color:var(--muted)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.btn-accent{background:var(--accent);color:white}
.btn-ghost{background:var(--editor);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2)}
.btn-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.btn-green:hover{background:rgba(34,197,94,0.25)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.statusbar{height:24px;background:var(--accent);display:flex;align-items:center;padding:0 16px;gap:16px;font-size:0.75rem;color:rgba(255,255,255,0.8);flex-shrink:0}
.loading-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(124,58,237,0.3);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--accent2);font-size:0.9rem}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:0.85rem;font-weight:500;z-index:999;display:none;animation:fadeUp 0.3s ease;white-space:nowrap}
.toast.success{background:rgba(34,197,94,0.9);color:white}
.toast.error{background:rgba(239,68,68,0.9);color:white}
.toast.info{background:rgba(124,58,237,0.9);color:white}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:420px}
.modal h3{font-size:1.1rem;margin-bottom:16px}
.modal input{width:100%;background:var(--editor);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:0.9rem;outline:none;margin-bottom:16px;font-family:inherit}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){.left-panel{width:240px}.sidebar{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">⚡ AI Studio</span>
  <div class="topbar-actions">
    <select class="model-select" id="modelSelect">
      <option value="deepseek">DeepSeek</option>
      <option value="llama">Llama 3 (Free)</option>
      <option value="mistral">Mistral (Free)</option>
      <option value="gemma">Gemma (Free)</option>
    </select>
    <button class="btn btn-ghost" onclick="copyCode()">📋</button>
    <button class="btn btn-ghost" onclick="downloadCode()">⬇️</button>
    <button class="btn btn-green" onclick="showDeployModal()">🚀 Deploy</button>
  </div>
</div>

<div class="workspace">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Processing...</div>
  </div>

  <div class="sidebar">
    <button class="sidebar-btn active" id="sb-generate" onclick="switchPanel('generate')" title="Generate">⚡</button>
    <button class="sidebar-btn" id="sb-chat" onclick="switchPanel('chat')" title="Chat">💬</button>
    <button class="sidebar-btn" id="sb-projects" onclick="switchPanel('projects')" title="Projects">📁</button>
  </div>

  <div class="left-panel">
    <!-- GENERATE -->
    <div id="generatePanel" style="display:flex;flex-direction:column;height:100%">
      <div class="panel-header">⚡ Generator</div>
      <div class="generate-form">
        <textarea id="genPrompt" placeholder="Describe your app...
e.g. Dark calculator app
e.g. Todo list with filters
e.g. Password generator"></textarea>
        <button class="gen-btn" id="genBtn" onclick="generateApp()">⚡ Generate App</button>
      </div>
      <div class="examples-section">
        <div class="examples-label">Quick examples</div>
        <div class="chips">
          <span class="chip" onclick="quickGen('Dark theme calculator')">Calculator</span>
          <span class="chip" onclick="quickGen('Todo list app with filters')">Todo List</span>
          <span class="chip" onclick="quickGen('Password generator with copy')">Password</span>
          <span class="chip" onclick="quickGen('BMI calculator with tips')">BMI</span>
          <span class="chip" onclick="quickGen('Countdown timer with alarm')">Timer</span>
          <span class="chip" onclick="quickGen('Notes app with save')">Notes</span>
          <span class="chip" onclick="quickGen('Currency converter')">Currency</span>
          <span class="chip" onclick="quickGen('Quiz app 10 questions')">Quiz</span>
        </div>
      </div>
      <div class="projects-section">
        <div class="panel-header">📁 Saved Projects</div>
        <div id="projectsList"><div class="empty-msg">No projects yet</div></div>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chatPanel" style="display:none;flex-direction:column;height:100%">
      <div class="panel-header">💬 AI Chat</div>
      <div class="chat-messages" id="chatMessages">
        <div class="message assistant">👋 Hi! Ask me anything about coding or app ideas!</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Ask anything..." onkeydown="chatKeydown(event)"></textarea>
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>

    <!-- PROJECTS -->
    <div id="projectsPanel" style="display:none;flex-direction:column;height:100%">
      <div class="panel-header">📁 All Projects</div>
      <div id="allProjectsList" style="overflow-y:auto;flex:1"><div class="empty-msg">No projects yet</div></div>
    </div>
  </div>

  <div class="editor-area">
    <div class="editor-tabs">
      <button class="tab active" id="tab-code" onclick="showTab('code')">💻 Code</button>
      <button class="tab" id="tab-preview" onclick="showTab('preview')">👁️ Preview</button>
    </div>
    <div class="editor-content">
      <textarea id="codeEditor" spellcheck="false" placeholder="// Generated code appears here..."></textarea>
      <iframe id="previewFrame"></iframe>
    </div>
    <div class="edit-bar">
      <input class="edit-input" id="editInput" placeholder="✏️ Edit: e.g. make button red, add dark mode..." onkeydown="editKeydown(event)"/>
      <button class="btn btn-accent" onclick="editCode()">✏️ Edit</button>
      <button class="btn btn-ghost" onclick="clearEditor()">🗑️</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <span>⚡ AI Studio</span>
  <span id="statusModel">DeepSeek</span>
  <span id="statusLines">Lines: 0</span>
  <span id="statusProject">No project</span>
</div>

<div class="modal-overlay" id="deployModal">
  <div class="modal">
    <h3>🚀 Deploy to Vercel</h3>
    <input type="text" id="deployName" placeholder="App name e.g. my-calculator" value="my-ai-app"/>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="hideDeployModal()">Cancel</button>
      <button class="btn btn-green" onclick="deployApp()" id="deployBtn">🚀 Deploy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentCode = '';
let currentProj = null;
let chatHistory = [];

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  loadProjects();
  updateStatus();
  document.getElementById('codeEditor').addEventListener('input', () => {
    currentCode = document.getElementById('codeEditor').value;
    updateStatus();
  });
  document.getElementById('modelSelect').addEventListener('change', updateStatus);
});

// ── PANELS ──
function switchPanel(p) {
  ['generate','chat','projects'].forEach(x => {
    document.getElementById(x+'Panel').style.display = 'none';
    document.getElementById('sb-'+x)?.classList.remove('active');
  });
  document.getElementById(p+'Panel').style.display = 'flex';
  document.getElementById('sb-'+p)?.classList.add('active');
  if(p==='projects') renderAllProjects();
}

// ── TABS ──
function showTab(t) {
  document.getElementById('codeEditor').style.display   = t==='code'    ? 'flex'  : 'none';
  document.getElementById('previewFrame').style.display = t==='preview' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='preview') document.getElementById('previewFrame').srcdoc = currentCode || '<p style="padding:20px;color:#666;font-family:sans-serif">No code yet.</p>';
}

// ── GENERATE ──
async function generateApp() {
  const prompt = document.getElementById('genPrompt').value.trim();
  if(!prompt){showToast('⚠️ Enter a prompt','error');return;}
  setLoading(true,'Generating your app...');
  document.getElementById('genBtn').disabled = true;
  try {
    const res  = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,model:getModel()})});
    const data = await res.json();
    if(data.error){showToast('❌ '+data.error,'error');return;}
    currentCode = data.code;
    document.getElementById('codeEditor').value = currentCode;
    updateStatus();
    await saveProject(prompt);
    showToast('✅ App generated!','success');
  } catch(e){showToast('❌ '+e.message,'error');}
  finally{setLoading(false);document.getElementById('genBtn').disabled=false;}
}

function quickGen(p){document.getElementById('genPrompt').value=p;generateApp();}

// ── EDIT ──
async function editCode() {
  const ins = document.getElementById('editInput').value.trim();
  if(!ins){showToast('⚠️ Enter instruction','error');return;}
  if(!currentCode){showToast('⚠️ No code to edit','error');return;}
  setLoading(true,'Applying edit...');
  try {
    const res  = await fetch('/api/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:currentCode,instruction:ins,model:getModel()})});
    const data = await res.json();
    if(data.error){showToast('❌ '+data.error,'error');return;}
    currentCode = data.code;
    document.getElementById('codeEditor').value = currentCode;
    document.getElementById('editInput').value  = '';
    updateStatus();
    showToast('✅ Updated!','success');
  } catch(e){showToast('❌ '+e.message,'error');}
  finally{setLoading(false);}
}

function editKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();editCode();}}

// ── CHAT ──
async function sendChat() {
  const input = document.getElementById('chatInput').value.trim();
  if(!input) return;
  document.getElementById('chatInput').value='';
  addMsg('user',input);
  chatHistory.push({role:'user',content:input});
  try {
    const res  = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory,model:'llama'})});
    const data = await res.json();
    if(data.error){addMsg('assistant','❌ '+data.error);return;}
    addMsg('assistant',data.reply);
    chatHistory.push({role:'assistant',content:data.reply});
    if(chatHistory.length>20) chatHistory=chatHistory.slice(-20);
  } catch(e){addMsg('assistant','❌ '+e.message);}
}

function addMsg(role,text) {
  const msgs = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'message '+role;
  div.innerHTML = text.replace(/```([\s\S]*?)```/g,'<pre style="background:#0d0d0d;padding:8px;border-radius:6px;margin-top:6px;overflow-x:auto;font-size:0.8rem">$1</pre>').replace(/\n/g,'<br>');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function chatKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

// ── PROJECTS ──
async function saveProject(name) {
  try {
    await fetch('/api/projects/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.slice(0,60),code:currentCode})});
    loadProjects();
  } catch(e){console.error(e);}
}

async function loadProjects() {
  try {
    const res  = await fetch('/api/projects');
    const data = await res.json();
    if(data.error) return;
    renderProjects(data.projects);
  } catch(e){console.error(e);}
}

function renderProjects(projects) {
  const list = document.getElementById('projectsList');
  if(!projects||!projects.length){list.innerHTML='<div class="empty-msg">No projects yet</div>';return;}
  list.innerHTML = projects.map(p=>`
    <div class="project-item" onclick="loadProjectById(${p.id})">
      <div>
        <div class="project-name">📄 ${p.name}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:2px">${new Date(p.created_at).toLocaleDateString()}</div>
      </div>
      <button class="project-del" onclick="event.stopPropagation();delProject(${p.id})">✕</button>
    </div>`).join('');
}

async function renderAllProjects() {
  try {
    const res  = await fetch('/api/projects');
    const data = await res.json();
    const list = document.getElementById('allProjectsList');
    if(!data.projects||!data.projects.length){list.innerHTML='<div class="empty-msg">No projects yet</div>';return;}
    list.innerHTML = data.projects.map(p=>`
      <div class="project-item" onclick="loadProjectById(${p.id});switchPanel('generate')">
        <div>
          <div class="project-name">📄 ${p.name}</div>
          <div style="font-size:0.7rem;color:var(--muted);margin-top:2px">${new Date(p.created_at).toLocaleDateString()}</div>
        </div>
        <button class="project-del" onclick="event.stopPropagation();delProject(${p.id})">✕</button>
      </div>`).join('');
  } catch(e){console.error(e);}
}

async function loadProjectById(id) {
  try {
    const res  = await fetch(`/api/projects/${id}`);
    const data = await res.json();
    if(data.error){showToast('❌ '+data.error,'error');return;}
    currentCode = data.project.code;
    currentProj = data.project.name;
    document.getElementById('codeEditor').value = currentCode;
    updateStatus();
    showToast('📁 Loaded: '+data.project.name,'info');
  } catch(e){showToast('❌ '+e.message,'error');}
}

async function delProject(id) {
  try {
    await fetch(`/api/projects/${id}`,{method:'DELETE'});
    showToast('🗑️ Deleted','info');
    loadProjects();
  } catch(e){showToast('❌ '+e.message,'error');}
}

// ── DEPLOY ──
function showDeployModal(){
  if(!currentCode){showToast('⚠️ Generate an app first','error');return;}
  document.getElementById('deployModal').classList.add('show');
}
function hideDeployModal(){document.getElementById('deployModal').classList.remove('show');}

async function deployApp() {
  const name = document.getElementById('deployName').value.trim()||'my-ai-app';
  const btn  = document.getElementById('deployBtn');
  btn.disabled=true; btn.innerText='⏳ Deploying...';
  try {
    const res  = await fetch('/api/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:currentCode,name})});
    const data = await res.json();
    if(data.error){showToast('❌ '+data.error,'error');return;}
    hideDeployModal();
    showToast('🚀 Live: '+data.url,'success');
    window.open(data.url,'_blank');
  } catch(e){showToast('❌ '+e.message,'error');}
  finally{btn.disabled=false;btn.innerText='🚀 Deploy';}
}

// ── UTILS ──
function getModel(){return document.getElementById('modelSelect').value;}

function copyCode(){
  if(!currentCode){showToast('⚠️ No code','error');return;}
  navigator.clipboard.writeText(currentCode);
  showToast('✅ Copied!','success');
}

function downloadCode(){
  if(!currentCode){showToast('⚠️ No code','error');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([currentCode],{type:'text/html'}));
  a.download='app.html'; a.click();
  showToast('✅ Downloaded!','success');
}

function clearEditor(){
  currentCode='';
  document.getElementById('codeEditor').value='';
  updateStatus();
  showToast('🗑️ Cleared','info');
}

function setLoading(show,text='Processing...'){
  document.getElementById('loadingText').innerText=text;
  document.getElementById('loadingOverlay').classList.toggle('show',show);
}

function updateStatus(){
  const m=document.getElementById('modelSelect');
  document.getElementById('statusModel').innerText=m.options[m.selectedIndex].text;
  document.getElementById('statusLines').innerText='Lines: '+(currentCode?currentCode.split('\n').length:0);
  document.getElementById('statusProject').innerText=currentProj?'📄 '+currentProj:'No project';
}

function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.className='toast '+type; t.innerText=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
